<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    
</head>
<body>


    <header>
        <h1>Webseite sederhana by Zamy</h1>

        <div class="menu">
            <a href="">Beranda</a>
            <a href="">Tentang</a>
            <a href="">Layanan</a>
            <a href="">Kontak</a>
        </div>
    </header>

    <div class="formulir">
        
        <div class="kiri">


            <form action="#" method="POST">

                <h2>Formulir pendaftaran</h2>
                <p>Silahkan isi formulir di bawah ini!</p>

                <div class="nama">
                    <label for="nama">Nama Lengkap</label> <br>
                    <input type="text" id="nama" name="nama">
                </div>
                    
                <br>

                <div class="email">
                    <label for="email">Email</label> <br>
                    <input type="email" id="email" name="email">
                </div>  

                <br>

                <div class="pw">
                    <label for="pw">Password</label> <br>
                    <input type="password" id="pw" name="pw">
                </div>

                <div class="jk">
                    <p>Jenis Kelamin :</p>
                    <input type="radio" id="l" name="jk" value="Laki-Laki">
                    <label for="l">Laki-Laki</label>
                    <input type="radio" id="p" name="jk" value="Perempuan">
                    <label for="p">Perempuan</label>
                </div>


                

                <br>
          

                <label for="kota">Pilih Kota :</label>
                <select name="kota" id="kota">
                    <option value="Jakarta">Jakarta</option>
                    <option value="Bandung">Bandung</option>
                    <option value="Karawang">Karawang</option>
                    <option value="Bekasi">Bekasi</option>
                    <option value="Purwakarta">Purwakarta</option>
                </select>

                <br>
                <br>

                <div class="hobi">
                    <label for="hobi">Hobi</label> <br>
                    <input class="hobi" type="text" name="hobi" id="hobi">
                </div>
                <br>
                <div class="pesan">
                    <label for="pesan">Pesan tambahan</label> <br>
                    <input class="pesan" type="text" name="pesan" id="pesan">
                </div>

                

                <br>

                <button type="submit">Daftar</button>

        


            </form>

        </div>
        

        <div class="sidebar">
            <h2>Sidebar</h2>
        </div>

    </div>

    
</body>
</html>
